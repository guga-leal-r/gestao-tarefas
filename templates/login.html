<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Privado</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        input { width: 100%; padding: 15px; font-size: 28px; text-align: center; border: 2px solid #eee; border-radius: 12px; margin-bottom: 20px; outline: none; }
        .btn { width: 100%; padding: 15px; background: #1877f2; color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 50px; margin-bottom: 10px;">🔒</div>
        <h3>Digite seu PIN</h3>
        <form method="POST">
            <input type="password" name="pin" placeholder="****" maxlength="4" inputmode="numeric" autofocus required>
            <button type="submit" class="btn">ACESSAR</button>
        </form>
    </div>
</body>
</html>

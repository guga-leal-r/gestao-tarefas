<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lista</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; margin: 0; padding: 15px; background: #f0f2f5; }
        .container { max-width: 500px; margin: auto; }
        
        /* Menu de Listas (Abas) */
        .abas { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 5px; }
        .aba { padding: 8px 15px; background: #ddd; border-radius: 20px; text-decoration: none; color: #555; white-space: nowrap; font-size: 14px; }
        .aba.ativa { background: #1877f2; color: white; font-weight: bold; }

        /* Estilo do App */
        h1 { text-align: center; color: #1877f2; font-size: 24px; }
        form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; }
        input, select, .btn-add { padding: 12px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        .btn-add { background: #42b72a; color: white; border: none; font-weight: bold; }

        .card { background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .concluida { text-decoration: line-through; color: #aaa; }
        .btn-del { color: red; text-decoration: none; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Minha Lista</h1>

        <!-- Menu de Navegação entre Listas -->
        <div class="abas">
            {% for nome in nomes_listas %}
                <a href="/?nome={{ nome }}" class="aba {{ 'ativa' if nome == atual }}">{{ nome }}</a>
            {% endfor %}
        </div>

        <!-- Formulário para Criar/Adicionar -->
        <form action="/add" method="POST">
            <input type="text" name="conteudo" placeholder="Nova tarefa..." required>
            <input type="text" name="lista_nome" placeholder="Nome da Lista (ex: Mercado)" value="{{ atual }}">
            <button type="submit" class="btn-add">Salvar na Lista</button>
        </form>

        <ul>
            {% for tarefa in lista %}
                <li class="card">
                    <span class="{{ 'concluida' if tarefa.feito }}">{{ tarefa.texto }}</span>
                    <div>
                        {% if not tarefa.feito %}
                            <a href="/concluir/{{ tarefa.id }}" style="text-decoration:none;">✔️</a>
                        {% endif %}
                        <a href="/deletar/{{ tarefa.id }}" class="btn-del" onclick="return confirm('Apagar?')">🗑️</a>
                    </div>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
